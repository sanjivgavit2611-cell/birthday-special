<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <h1 class="fade-in">Happy Birthday! 🎂</h1>
            <p class="subtitle">Wishing you a day filled with love and laughter.</p>
            
            <div class="image-container">
                <img src="birthday_person.jpg" alt="Birthday Person" class="profile-pic">
            </div>

            <button id="surpriseBtn" onclick="showSurprise()">Click for a Surprise! ✨</button>
            
            <div id="message" class="hidden">
                <p>"Aap jaise dost/insaan ka hona kisi blessing se kam nahi. Have an amazing year ahead!"</p>
                <div class="confetti"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
